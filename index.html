<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Rasmalai ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(-45deg,#ff4d6d,#ff758f,#ff8fa3,#ffc2d1);
background-size:400% 400%;
animation:bg 12s ease infinite;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
max-width:850px;
padding:30px;
z-index:2;
}

h1{
font-size:55px;
margin-bottom:20px;
text-shadow:0 0 20px rgba(255,255,255,.8);
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px white; }
to{ text-shadow:0 0 30px white; }
}

#text{
font-size:24px;
line-height:1.8;
min-height:320px;
}

.btn{
margin-top:20px;
padding:15px 35px;
border:none;
border-radius:50px;
font-size:20px;
cursor:pointer;
background:white;
color:#ff3366;
font-weight:bold;
transition:.3s;
}

.btn:hover{
transform:scale(1.1);
}

#final{
display:none;
font-size:40px;
margin-top:20px;
animation:fade 2s ease forwards;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

.heart{
position:absolute;
font-size:25px;
animation:fall linear infinite;
opacity:.8;
}

@keyframes fall{
0%{
transform:translateY(-100px);
}
100%{
transform:translateY(110vh);
}
}
</style>
</head>

<body>

<div class="container">

<h1>🍮 My Rasmalai ❤️</h1>

<div id="text"></div>

<button class="btn" onclick="showLove()">
❤️ Continue ❤️
</button>

<div id="final">
Aryan ❤️ Harshita <br>
♾️ Forever & Always ♾️
<br><br>
I Love You More Than Words Can Ever Explain ❤️
</div>

<!-- SONG -->
<audio autoplay loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

</div>

<script>

const message = `

Dear Harshita,

There are billions of people in this world...

Yet somehow, my heart chose only one.

❤️ You ❤️

Before you came into my life,
my days were ordinary.

But then you arrived...

And suddenly,
every moment became worth remembering.

Every smile of yours became my favorite sight.

Every message from you became the best part of my day.

And every "I Love You"
became my favorite melody. 🎶❤️

You know why I call you My Rasmalai? 🍮

Because you're the sweetest part of my life.

Because no matter how bad my day gets,
just one thought of you makes everything better.

I don't promise a perfect life.

But I promise that no matter what happens...

I will always choose you.

Again.

And Again.

And Again.

Forever. ❤️

If I had a thousand lives,
I would still search for you
in every single one of them.

And if I could fall in love again...

I would still choose you.

Every Time. ❤️✨

`;

let i = 0;
const speed = 45;

function typeWriter(){
if(i < message.length){
document.getElementById("text").innerHTML += message.charAt(i);
i++;
setTimeout(typeWriter,speed);
}
}

typeWriter();

function showLove(){
document.querySelector(".btn").style.display="none";
document.getElementById("final").style.display="block";
}

function createHeart(){
const heart = document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*4+4)+"s";
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
