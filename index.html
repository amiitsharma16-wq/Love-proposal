<head>

<title>For Harshita ❤️</title>

<style>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Story ❤️</title>

<style>
body{
height:100vh;
overflow:hidden;
background:radial-gradient(circle,#000,#111,#000);
color:white;
text-align:center;
font-family:Arial;
}

.screen{
display:flex;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}

.card{
background:rgba(255,255,255,0.07);
padding:20px;
border-radius:15px;
backdrop-filter:blur(10px);
max-width:400px;
}

img{
width:300px;
height:400px;
object-fit:cover;
border-radius:15px;
box-shadow:0 0 20px rgba(255,255,255,0.1);
}

.caption{
margin-top:10px;
color:#ddd;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:20px;
background:white;
color:black;
font-weight:bold;
}
</style>
</head>

<body>

<div class="screen">
<div class="card">
<img id="img" src="photo1.jpg">
<div class="caption" id="cap"></div>
<button onclick="next()">Next ❤️</button>
</div>
</div>

<script>

let i=0;

const images=[
"photo1.jpg","photo2.jpg","photo3.jpg",
"photo4.jpg","photo5.jpg"
];

const captions=[
"Among millions of people, I found you ❤️",
"You are my peace 🖤",
"My favorite smile ✨",
"My safe place 💕",
"My forever Rasmalai 🍮❤️"
];

function next(){

i++;

if(i>=images.length){
window.location.href="#part3.html";
return;
}

document.getElementById("img").src=images[i];
document.getElementById("cap").innerText=captions[i];

}

document.getElementById("cap").innerText=captions[0];

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Question ❤️</title>

<style>
body{
height:100vh;
overflow:hidden;
background:radial-gradient(circle,#000,#0a0a0a,#000);
color:white;
font-family:Arial;
text-align:center;
}

.card{
background:rgba(255,255,255,0.08);
padding:25px;
border-radius:18px;
max-width:420px;
backdrop-filter:blur(15px);
margin:auto;
margin-top:15%;
}

button{
margin-top:10px;
padding:12px 20px;
border:none;
border-radius:20px;
background:white;
color:black;
font-weight:bold;
cursor:pointer;
}

.heart{
position:absolute;
font-size:20px;
animation:fall 4s linear forwards;
}

@keyframes fall{
from{transform:translateY(-100px);opacity:1;}
to{transform:translateY(110vh);opacity:0;}
}

.glow{
color:#ff4da6;
text-shadow:0 0 20px #ff4da6;
}
</style>
</head>

<body>

<div class="card">
<h1 class="glow">Will you be mine forever,<br>Harshita (Rasmalai)? 🍮❤️</h1>

<button onclick="yes()">Yes 🤍</button>
<button onclick="yes()">Of course 🌸</button>
<button onclick="yes()">Forever ♾️</button>
<button onclick="yes()">Always yours 💕</button>

<p style="margin-top:15px;color:#ccc;">
No matter what you choose… my answer will always be YOU ❤️
</p>
</div>

<script>

function yes(){
rain();
setTimeout(()=>{
alert("I LOVE YOU HARSHITA ❤️♾️");
},1000);
}

function rain(){

for(let i=0;i<60;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="🤍";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);

setTimeout(()=>h.remove(),4000);
}

}

</script>

</body>
</html>
